---
name: "ntfy"
version: "1.1.0"
slug: "ntfy"
description: >-
  Self-hosted ntfy push notification server (send/receive push notifications to
  your phone or desktop via PUT/POST), with persistent auth, cache and
  attachment storage, and a direct host port for a reverse proxy /
  Cloudflare Tunnel.
url: "https://github.com/PineappleEmperor/ntfy-ha/tree/main/ntfy"
arch:
  - aarch64
  - amd64
init: false
startup: services
boot: auto
# "Open Web UI" button on the add-on page. [HOST] resolves to the Home
# Assistant host IP and [PORT:80] to the host port mapped to container port 80
# (8199 by default), so the button opens the working ntfy web UI on the LAN.
webui: "http://[HOST]:[PORT:80]/"
ports:
  80/tcp: 8199
ports_description:
  80/tcp: >-
    ntfy HTTP API + web UI, published on host port 8199. Point your reverse
    proxy / Cloudflare Tunnel at this port, or open it directly on your LAN.
    Change the host port here to match your tunnel; leave empty to disable
    direct exposure.
options:
  base_url: "https://ntfy.juicebox.casa"
  upstream_base_url: "https://ntfy.sh"
  auth_enabled: true
  auth_default_access: "deny-all"
  behind_proxy: true
  cache_duration: "12h"
  log_level: "info"
schema:
  base_url: "str"
  upstream_base_url: "str?"
  auth_enabled: "bool"
  auth_default_access: "list(deny-all|read-only|read-write|write-only)"
  behind_proxy: "bool"
  cache_duration: "str"
  admin_user: "str?"
  admin_password: "password?"
  log_level: "list(trace|debug|info|warn|error)"
