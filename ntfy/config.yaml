---
name: "ntfy"
version: "1.0.0"
slug: "ntfy"
description: >-
  Self-hosted ntfy push notification server (send/receive push notifications to
  your phone or desktop via PUT/POST), with persistent auth, cache and
  attachment storage, ingress and an optional direct host port for a reverse
  proxy / Cloudflare Tunnel.
url: "https://github.com/PineappleEmperor/ntfy-ha/tree/main/ntfy"
arch:
  - aarch64
  - amd64
  - armv7
init: false
startup: services
boot: auto
ingress: true
ingress_port: 80
panel_icon: "mdi:bell-ring"
panel_title: "ntfy"
ports:
  80/tcp: 8199
ports_description:
  80/tcp: >-
    ntfy HTTP API + web UI, published on host port 8199. Point your reverse
    proxy / Cloudflare Tunnel at this port. Change the host port here to match
    your tunnel; leave empty to disable direct exposure and use ingress only.
options:
  base_url: "https://ntfy.juicebox.casa"
  upstream_base_url: "https://ntfy.sh"
  auth_enabled: true
  auth_default_access: "deny-all"
  behind_proxy: true
  cache_duration: "12h"
  log_level: "info"
schema:
  base_url: "str"
  upstream_base_url: "str?"
  auth_enabled: "bool"
  auth_default_access: "list(deny-all|read-only|read-write|write-only)"
  behind_proxy: "bool"
  cache_duration: "str"
  admin_user: "str?"
  admin_password: "password?"
  log_level: "list(trace|debug|info|warn|error)"
